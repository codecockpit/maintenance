  <style>
    :root {
      --bg: #0B0F14;
      --green: #00E68C;
      --amber: #FFB020;
      --text: #E8EDF2;
      --dim: #8A97A6;
      --mono: "JetBrains Mono", ui-monospace, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text); text-align: center;
      font-family: "Inter Tight", system-ui, sans-serif;
      line-height: 1.6;
    }
    .wrap { padding: 48px 24px; max-width: 600px; position: relative; }
    .wrap::before, .wrap::after {
      content: ""; position: absolute; width: 22px; height: 22px;
    }
    .wrap::before { top: 0; left: 0; border-top: 2px solid var(--green); border-left: 2px solid var(--green); }
    .wrap::after { bottom: 0; right: 0; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); }
    .kicker {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em;
      color: var(--amber); border: 1px solid var(--amber); border-radius: 999px;
      display: inline-block; padding: 4px 16px;
    }
    h1 { font-size: clamp(34px, 7vw, 52px); margin: 22px 0 10px; letter-spacing: -0.02em; }
    h1 .accent { color: var(--green); }
    p.sub { color: var(--dim); margin: 0 0 8px; }
    p.retry { font-family: var(--mono); font-size: 13px; color: var(--dim); margin-top: 28px; }
    a { color: var(--green); text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    .sign { font-family: var(--mono); color: var(--green); margin-top: 36px; font-size: 15px; }
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="kicker">IN THE HANGAR</span>
    <h1>Scheduled <span class="accent">maintenance.</span></h1>
    <p class="sub">codecockpit.dev is down for planned work. Nothing is wrong; the aircraft is just getting serviced.</p>
    <p class="sub">Meanwhile, the videos are still flying: <a href="https://www.youtube.com/@codecockpit">youtube.com/@codecockpit</a></p>
    <p class="retry">This page rechecks automatically every 60 seconds.</p>
    <p class="sign">Fly safe. <span class="cursor">▊</span></p>
  </div>
</body>
